name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk Card-virtuweel.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Card-virtuweel-apk
          path: Card-virtuweel.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Card-virtuweel ${{ github.ref_name }}
          files: Card-virtuweel.apk
          body: |
            ## Card-virtuweel ${{ github.ref_name }}

            ### Installeren
            1. Download `Card-virtuweel.apk`
            2. Zet "Installatie van onbekende bronnen" aan in Android-instellingen
            3. Open het APK-bestand en kies **Installeren**

            > Dit is een debug-build. De app opent de Card-virtuweel webserver via WebView.
