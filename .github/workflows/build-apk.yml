name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      upload_tag:
        description: 'Release tag to upload the APK to (leave empty to skip release upload)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure Gradle wrapper is executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk Card-virtuweel.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Card-virtuweel-apk
          path: Card-virtuweel.apk

      - name: Create or update GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Card-virtuweel ${{ github.ref_name }}
          files: Card-virtuweel.apk
          body: |
            ## Card-virtuweel ${{ github.ref_name }}

            ### Installeren
            1. Download `Card-virtuweel.apk`
            2. Zet "Installatie van onbekende bronnen" aan in Android-instellingen
            3. Open het APK-bestand en kies **Installeren**

            > Dit is een debug-build. De app opent de Card-virtuweel webserver via WebView.

      - name: Create or update 'latest' release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Card-virtuweel – nieuwste versie
          make_latest: true
          files: Card-virtuweel.apk
          body: |
            Automatisch bijgewerkte APK van de `main`-branch.

            ### Installeren
            1. Download `Card-virtuweel.apk`
            2. Zet "Installatie van onbekende bronnen" aan in Android-instellingen
            3. Open het APK-bestand en kies **Installeren**

            > Dit is een debug-build. De app opent de Card-virtuweel webserver via WebView.

      - name: Upload APK to existing release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.upload_tag }}
          files: Card-virtuweel.apk
